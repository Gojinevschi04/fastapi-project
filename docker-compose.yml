services:
  postgres_db:
    container_name: postgres_db
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASS:-pass}
      POSTGRES_DB: ${DB_NAME:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quiet_call_net

  voice_api:
    container_name: voice_api
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres_db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - quiet_call_net

  voice_worker:
    container_name: voice_worker
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres_db:
        condition: service_healthy
    command: python -m app.worker
    networks:
      - quiet_call_net

volumes:
  postgres_data:
  app_storage:

networks:
  quiet_call_net:
    driver: bridge
